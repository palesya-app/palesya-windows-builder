name: Build Palesya Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag privato da compilare (es. v1.2.0-pilot.41)"
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: palesya-windows-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout private Palesya source
        uses: actions/checkout@v5
        with:
          repository: palesya-app/palesya
          ref: ${{ inputs.release_tag || github.ref_name }}
          ssh-key: ${{ secrets.SOURCE_DEPLOY_KEY }}
          persist-credentials: false
          fetch-depth: 1

      - name: Record private source commit
        shell: pwsh
        run: |
          $sourceCommit = (git rev-parse HEAD).Trim()
          "PALESYA_SOURCE_COMMIT=$sourceCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          [System.IO.File]::WriteAllText("source-commit.txt", "$sourceCommit`n", [System.Text.Encoding]::ASCII)
          Write-Host "Building private source commit $sourceCommit"

      - name: Set up Python x64
        id: python-x64
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: pip

      - name: Install build dependencies
        shell: pwsh
        run: |
          & "${{ steps.python-x64.outputs.python-path }}" -m pip install --upgrade pip
          & "${{ steps.python-x64.outputs.python-path }}" -m pip install -r requirements-dev.txt

      - name: Set up Python x86 for legacy RFID bridge
        id: python-x86
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "x86"

      - name: Install x86 bridge build dependency
        shell: pwsh
        run: '& "${{ steps.python-x86.outputs.python-path }}" -m pip install "pyinstaller>=6.12,<7"'

      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --yes --no-progress
          }
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup 6 non disponibile sul runner."
          }

      - name: Build Windows installer
        shell: pwsh
        env:
          PALESYA_VERSION: ${{ inputs.release_tag || github.ref_name }}
          PALESYA_MAIN_PYTHON: ${{ steps.python-x64.outputs.python-path }}
          PALESYA_BRIDGE_PYTHON: ${{ steps.python-x86.outputs.python-path }}
          PALESYA_REQUIRE_X86_BRIDGE: "1"
        run: .\packaging\build_windows.ps1 -SkipManifest

      - name: Smoke test installer and installed application
        shell: pwsh
        env:
          PALESYA_VERSION: ${{ inputs.release_tag || github.ref_name }}
        run: .\scripts\test_windows_payload.ps1 -SkipManifest

      - name: Verify artifact source commit
        shell: pwsh
        run: |
          $expected = (Get-Content source-commit.txt -Raw).Trim()
          $buildInfo = Get-Content packaging\build-info.json -Raw | ConvertFrom-Json
          if ($buildInfo.source_commit -ne $expected) {
            throw "Build info non allineato al commit sorgente."
          }

      - name: Upload verified installer
        uses: actions/upload-artifact@v4
        with:
          name: Palesya-windows-x64-${{ inputs.release_tag || github.ref_name }}
          path: |
            dist/PalesyaSetup.exe
            dist/PalesyaSetup.exe.sha256
            source-commit.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 3

      - name: Publish verified public download
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = @("dist\PalesyaSetup.exe", "dist\PalesyaSetup.exe.sha256", "source-commit.txt")
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag @assets --repo $env:GITHUB_REPOSITORY `
              --title "Palesya Windows $tag" `
              --notes "Installer Windows verificato dal commit privato indicato in source-commit.txt."
          }

  build-macos:
    # macOS viene gia compilato, firmato e pubblicato dal workflow privato
    # Palesya Desktop Release. Il builder pubblico resta dedicato a Windows,
    # evitando code duplicate sul runner Mac self-hosted.
    if: ${{ false }}
    needs: build-windows
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-arm64, macos-x64]
    # Il runner Mac e self-hosted: la pubblicazione rimane gratuita e il
    # repository pubblico riceve solo i pacchetti compilati, mai i sorgenti.
    runs-on: [self-hosted, palesya, macos-arm64]
    timeout-minutes: 45
    steps:
      - name: Checkout private Palesya source
        uses: actions/checkout@v5
        with:
          repository: palesya-app/palesya
          ref: ${{ inputs.release_tag || github.ref_name }}
          ssh-key: ${{ secrets.SOURCE_DEPLOY_KEY }}
          persist-credentials: false
          fetch-depth: 1

      - name: Build verified macOS package
        env:
          PALESYA_VERSION: ${{ inputs.release_tag || github.ref_name }}
          PALESYA_PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .release-venv
          if [ "$PALESYA_PLATFORM" = "macos-x64" ]; then
            /usr/bin/arch -x86_64 /usr/bin/python3 -m venv .release-venv
            run_python() { /usr/bin/arch -x86_64 .release-venv/bin/python "$@"; }
          else
            /usr/bin/python3 -m venv .release-venv
            run_python() { .release-venv/bin/python "$@"; }
          fi
          run_python -m pip install --upgrade pip
          run_python -m pip install -r requirements-dev.txt
          run_python packaging/write_build_info.py
          run_python -m PyInstaller --noconfirm --clean packaging/Palesya.spec
          run_python -m PyInstaller --noconfirm --clean packaging/PalesyaUpdater.spec
          cp dist/PalesyaUpdater dist/Palesya.app/Contents/MacOS/PalesyaUpdater
          codesign --force --deep --sign - dist/Palesya.app
          codesign --verify --deep --strict dist/Palesya.app
          ditto -c -k --sequesterRsrc --keepParent dist/Palesya.app "dist/Palesya-${PALESYA_PLATFORM}.zip"
          (cd dist && shasum -a 256 "Palesya-${PALESYA_PLATFORM}.zip" > "Palesya-${PALESYA_PLATFORM}.zip.sha256")

      - name: Upload verified macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Palesya-${{ matrix.platform }}-${{ inputs.release_tag || github.ref_name }}
          path: |
            dist/Palesya-${{ matrix.platform }}.zip
            dist/Palesya-${{ matrix.platform }}.zip.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 3

      - name: Publish verified public macOS download
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          PALESYA_PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          gh release upload "$tag" \
            "dist/Palesya-${PALESYA_PLATFORM}.zip" \
            "dist/Palesya-${PALESYA_PLATFORM}.zip.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber
